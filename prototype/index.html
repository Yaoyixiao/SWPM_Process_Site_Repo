<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Project Management — Process Viewer</title>
<style>
  /* ============ Tokens ============ */
  :root {
    --bg: #f1f4f8;
    --surface: #ffffff;
    --text: #2a333e;
    --text-muted: #819bb0;
    --border: #e4e7ec;
    --border-soft: #e1e6ec;
    --header-grad-top: #ebeef3;
    --header-grad-bot: #d8dfe8;
    --brand-start: #609eeb;
    --brand-end: #4690eb;
    --accent-hover: #51acd3;
    --shadow-card: 0 0 0 1px rgba(0,0,0,0.04);
    --drawer-w: 380px;
    --drawer-rail-w: 60px;
    --shadow-drawer: -6px 0 24px rgba(20,40,80,0.08);
    --brand-glow: rgba(70,144,235,0.18);
    --field-index-color: #c1cad6;
  }

  /* ============ Reset ============ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Source Sans Pro', -apple-system, BlinkMacSystemFont,
                 'Segoe UI', system-ui, Roboto, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  a { color: var(--text-muted); text-decoration: none; }
  a:hover { color: var(--text); }
  button { font: inherit; color: inherit; cursor: pointer; background: transparent; border: 0; }
  input { font: inherit; color: inherit; }

  /* ============ App shell: left rail | main | right rail ============ */
  .app {
    display: grid;
    grid-template-columns: 220px 1fr 60px;
    height: 100vh;
    min-width: 1024px;
  }
  .main { display: flex; flex-direction: column; min-width: 0; overflow: hidden; }

  /* ============ Left rail (pages) ============ */
  .left-rail {
    background: #fff;
    border-right: 1px solid var(--border);
    padding: 18px 0 12px;
    overflow-y: auto;
  }
  .left-rail-heading {
    padding: 4px 18px 8px;
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.7px;
    color: var(--text-muted);
  }
  .left-rail-item {
    display: flex; align-items: center; gap: 10px;
    width: 100%; padding: 8px 18px;
    border: 0; background: transparent;
    text-align: left; font-size: 14px;
    color: var(--text-muted);
    border-left: 3px solid transparent;
    position: relative;
  }
  .left-rail-item:hover { background: var(--bg); color: var(--text); }
  .left-rail-item .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--border); flex-shrink: 0;
  }
  .left-rail-item.active {
    background: var(--bg);
    color: var(--text);
    border-left-color: var(--brand-end);
    font-weight: 500;
  }
  .left-rail-item.active .dot { background: var(--brand-end); }

  /* ============ Search bar ============ */
  .search-bar { padding: 14px 30px 4px; }
  .search-wrap { position: relative; }
  .search-wrap input {
    width: 100%; height: 36px;
    padding: 0 14px 0 36px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: #fff
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%23819bb0' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='11' cy='11' r='7'/><path d='m20 20-3-3'/></svg>")
      no-repeat 12px center;
  }
  .search-wrap input::placeholder { color: var(--text-muted); }
  .search-wrap input:focus { outline: none; border-color: var(--brand-end); }

  /* ============ Page header ============ */
  .page-header { padding: 12px 30px 0; }
  .breadcrumb-line {
    display: flex; align-items: center; justify-content: space-between;
    padding-bottom: 4px;
  }
  .breadcrumb { display: flex; gap: 6px; align-items: center; font-size: 13px; color: var(--text-muted); }
  .breadcrumb .sep { color: var(--text-muted); }
  .stat-chip {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 4px 10px;
    background: #fff;
    border-radius: 14px;
    font-size: 12px;
    color: var(--text);
    box-shadow: var(--shadow-card);
    font-variant-numeric: tabular-nums;
  }
  .stat-chip .seg { display: inline-flex; align-items: center; gap: 4px; }
  .stat-chip .seg .label { color: var(--text-muted); margin-right: 2px; }
  .stat-chip .total .num { color: var(--text); font-weight: 500; }
  .version-chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 12px;
    background: #fff;
    border-radius: 14px;
    font-size: 12px;
    color: var(--text);
    box-shadow: var(--shadow-card);
  }
  .version-chip .dot {
    width: 14px; height: 14px;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--brand-end); font-size: 11px; font-weight: 700;
  }
  .page-title { font-size: 26px; font-weight: 400; padding: 6px 0 14px; color: var(--text); }

  /* ============ Tabs row ============ */
  .tabs-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0 30px;
    border-bottom: 1px solid var(--border);
  }
  .tabs { display: flex; gap: 28px; }
  .tab {
    padding: 10px 0; cursor: pointer;
    font-size: 12px; text-transform: uppercase; letter-spacing: 0.6px;
    color: var(--text-muted);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
  }
  .tab.active { color: var(--brand-end); border-bottom-color: var(--brand-end); font-weight: 500; }
  .tab:hover { color: var(--text); }
  .tb-icons { display: flex; gap: 2px; align-items: center; color: var(--text-muted); }
  .tb-icons button {
    width: 32px; height: 36px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 4px; font-size: 16px; line-height: 1;
  }
  .tb-icons button:hover:not(:disabled) { color: var(--accent-hover); background: rgba(81,172,211,0.10); }
  .tb-icons button:disabled { color: var(--border-soft); cursor: not-allowed; }
  .tb-icons .zoom { padding: 0 10px; font-size: 13px; min-width: 48px; text-align: center; }
  .tb-icons .zoom-ratio {
    height: 26px; margin: 0 4px; padding: 0 4px; font-size: 12px;
    color: var(--text-muted); background: #fff;
    border: 1px solid var(--border-soft); border-radius: 4px; cursor: pointer;
  }

  /* ============ Matrix card / canvas ============ */
  .matrix-card {
    margin: 12px 30px 14px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 4px;
    flex: 1;
    position: relative;
    overflow: auto;
    min-height: 0;
  }
  .matrix-card.pannable { cursor: grab; }
  .matrix-card.panning  { cursor: grabbing; user-select: none; }
  #canvas {
    position: relative;
    margin: 0 auto;
    width: 1220px;
    zoom: 1;
    transform-origin: 0 0;
  }

  /* Canvas structural cells */
  .canvas-header,
  .canvas-row {
    width: 100%;
  }
  .h-cell {
    height: 35px;
    background: linear-gradient(180deg, var(--header-grad-top) 0%, var(--header-grad-bot) 100%);
    color: var(--text-muted);
    font-size: 14px; font-weight: 500;
    display: flex; align-items: center; justify-content: center;
    border-right: 1px solid var(--border);
  }
  .h-cell:last-child { border-right: 0; }
  .col {
    background: #fff;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .canvas-row:last-child .col { border-bottom: 0; }

  /* ============ Activity nodes ============ */
  .activity {
    position: absolute;
    background: linear-gradient(180deg, var(--brand-start) 0%, var(--brand-end) 100%);
    color: #fff;
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    z-index: 3;
    box-shadow: 0 1px 0 rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.18);
    text-shadow: 0 1px 0 rgba(0,0,0,0.05);
    user-select: none;
    cursor: pointer;
  }
  .activity .label {
    text-align: center;
    padding: 0 8px;
    line-height: 1.2;
  }
  .activity.ellipse {
    border-radius: 50%;
    font-size: 0;
  }
  .activity.drillable {
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .activity.drillable:hover {
    transform: translateY(-1px);
    box-shadow: 0 2px 0 rgba(0,0,0,0.04), 0 4px 8px rgba(0,0,0,0.25);
  }
  .drill-cue {
    position: absolute;
    top: 4px; right: 6px;
    font-size: 11px; opacity: 0.85;
  }

  /* ============ SVG edges ============ */
  .canvas-svg {
    position: absolute;
    top: 0; left: 0;
    pointer-events: none;
    z-index: 2;
  }
  .seg {
    stroke: #819bb0;
    stroke-width: 1;
    fill: none;
  }

  /* ============ Right rail (mode switcher) ============ */
  .right-rail {
    background: var(--bg);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column; align-items: center;
    padding-top: 60px; gap: 2px;
  }
  .rail-btn {
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted);
    font-size: 17px;
    border-radius: 4px;
    line-height: 1;
  }
  .rail-btn:hover { color: var(--text); }
  .rail-btn.active {
    color: var(--brand-end);
    background: #fff;
    box-shadow: 0 0 0 1px var(--border);
  }
  .rail-btn .ico-svg { width: 18px; height: 18px; }

  /* ============ Footer mark ============ */
  .page-footer {
    padding: 6px 30px 14px;
    text-align: left;
  }
  .page-footer .stages-mark {
    display: inline-block;
    width: 56px; height: 18px;
    background:
      linear-gradient(90deg, var(--brand-end) 0%, var(--brand-end) 8px, transparent 8px),
      linear-gradient(180deg, transparent 4px, var(--text-muted) 4px, var(--text-muted) 6px, transparent 6px);
    background-repeat: no-repeat;
    background-size: 56px 18px;
    opacity: .75;
  }

  /* ============ Drawer (node details) ============ */
  .app { transition: margin-right 200ms ease; }
  .app.drawer-open { margin-right: calc(var(--drawer-w) - var(--drawer-rail-w)); }

  .drawer {
    position: fixed; top: 0; right: 0;
    width: var(--drawer-w); height: 100vh;
    background: var(--surface);
    border-left: 1px solid var(--border);
    box-shadow: var(--shadow-drawer);
    transform: translateX(100%);
    transition: transform 200ms ease;
    z-index: 50;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .drawer.open { transform: translateX(0); }

  .drawer-head {
    padding: 18px 22px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .drawer-chrome {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 6px;
  }

  .drawer-eyebrow {
    font-size: 11px; font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.9px;
    margin-top: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .drawer-eyebrow::before {
    content: "";
    width: 18px; height: 1px;
    background: var(--text-muted);
    flex-shrink: 0;
  }

  .drawer-title {
    font-size: 19px; font-weight: 500;
    color: var(--text);
    margin-top: 6px;
    letter-spacing: -0.01em;
    line-height: 1.25;
  }
  .drawer-sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .drawer-body {
    padding: 4px 22px 24px;
    overflow-y: auto;
    flex: 1;
    scrollbar-gutter: stable;
    transition: opacity 90ms ease;
  }
  .drawer-body::-webkit-scrollbar { width: 6px; }
  .drawer-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .drawer-drill {
    margin-right: auto;
    padding: 6px 14px;
    border-radius: 4px;
    background: linear-gradient(180deg, var(--brand-start), var(--brand-end));
    color: #fff;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.2px;
    transition: transform 120ms ease, filter 120ms ease;
  }
  .drawer-drill:hover { filter: brightness(1.06); transform: translateY(-1px); }
  .drawer-drill:focus-visible { outline: 2px solid var(--brand-start); outline-offset: 2px; }

  .drawer-close {
    width: 28px; height: 28px;
    border-radius: 4px;
    color: var(--text-muted);
    font-size: 13px; line-height: 1;
    display: inline-flex; align-items: center; justify-content: center;
    transition: background-color 120ms, color 120ms;
  }
  .drawer-close:hover { color: var(--text); background: var(--bg); }
  .drawer-close:focus-visible { outline: 2px solid var(--brand-end); outline-offset: 1px; }

  /* Spec-sheet row */
  .drawer-field {
    display: grid;
    grid-template-columns: 28px 1fr;
    gap: 14px;
    padding: 14px 0 16px;
    border-bottom: 1px solid var(--border-soft);
  }
  .drawer-field:last-child { border-bottom: 0; }
  .drawer-field-idx {
    font-size: 11px;
    font-weight: 600;
    color: var(--field-index-color);
    letter-spacing: 0.5px;
    padding-top: 3px;
    text-align: right;
    border-right: 1px solid var(--border);
    padding-right: 10px;
    font-variant-numeric: tabular-nums;
    user-select: none;
  }
  .drawer-field-label {
    font-size: 11px; font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.7px;
    margin-bottom: 6px;
  }
  .drawer-field-value {
    font-size: 13.5px;
    color: var(--text);
    word-break: break-word;
    line-height: 1.5;
  }

  .drawer-link {
    display: block;
    color: var(--brand-end);
    padding: 2px 0;
    font-size: 13px;
    word-break: break-all;
    transition: color 120ms;
  }
  .drawer-link:hover { color: var(--brand-start); text-decoration: underline; text-underline-offset: 2px; }
  .drawer-link:focus-visible { outline: 2px solid var(--brand-end); outline-offset: 1px; border-radius: 2px; }

  /* Empty state */
  .drawer-empty { padding: 22px 0 8px; }
  .drawer-empty-head {
    font-size: 11px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.7px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .drawer-empty-hint {
    font-size: 13px;
    color: var(--text);
    line-height: 1.55;
  }
  .drawer-empty-hint code {
    font-family: ui-monospace, 'SF Mono', Consolas, monospace;
    font-size: 12px;
    background: var(--bg);
    padding: 1px 5px;
    border-radius: 3px;
    border: 1px solid var(--border-soft);
  }

  /* Concentric selection ring on the active activity (signature) */
  .activity.selected {
    outline: 2px solid var(--brand-end);
    outline-offset: 3px;
    box-shadow:
      0 0 0 1px #fff inset,
      0 0 0 6px var(--brand-glow);
  }

  @media (prefers-reduced-motion: reduce) {
    .drawer, .app, .drawer-body { transition: none; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- ================== LEFT RAIL ================== -->
  <aside class="left-rail" id="leftRail" aria-label="Process pages"></aside>

  <!-- =================== MAIN =================== -->
  <div class="main">

    <div class="search-bar">
      <div class="search-wrap">
        <input type="search" placeholder="Search for process content" autocomplete="off" />
      </div>
    </div>

    <div class="page-header">
      <div class="breadcrumb-line">
        <nav class="breadcrumb" id="breadcrumb">
          <span>Process</span><span class="sep">›</span><span>Workflows and Activities</span>
        </nav>
        <span class="stat-chip" id="statChip"></span>
        <span class="version-chip">
          <span>Release 50.0</span>
          <span class="dot" title="Valid">✓</span>
        </span>
      </div>
      <h1 class="page-title" id="pageTitle">Process</h1>
    </div>

    <div class="tabs-row">
      <div class="tabs">
        <div class="tab">Flow</div>
        <div class="tab active">Table</div>
        <div class="tab">Grid</div>
      </div>
      <div class="tb-icons">
        <button id="zoomFit" title="Fit to page" aria-label="Fit to page">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 9V4h5"/><path d="M20 9V4h-5"/>
            <path d="M4 15v5h5"/><path d="M20 15v5h-5"/>
          </svg>
        </button>
        <button id="zoomOut" title="Zoom out" aria-label="Zoom out">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14"/></svg>
        </button>
        <span class="zoom" id="zoomPct">100%</span>
        <button id="zoomIn" title="Zoom in" aria-label="Zoom in">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        </button>
        <select id="zoomRatio" class="zoom-ratio" title="Zoom level" aria-label="Zoom level">
          <option value="0.25">25%</option>
          <option value="0.5">50%</option>
          <option value="0.75">75%</option>
          <option value="1" selected>100%</option>
          <option value="1.25">125%</option>
          <option value="1.5">150%</option>
          <option value="2">200%</option>
          <option value="4">400%</option>
        </select>
        <button title="Collapse" aria-label="Collapse">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 15l-6-6-6 6"/></svg>
        </button>
        <button title="More" aria-label="More options">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5"  r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg>
        </button>
      </div>
    </div>

    <div class="matrix-card">
      <div id="canvas"></div>
    </div>

    <div class="page-footer"><span class="stages-mark" aria-hidden="true"></span></div>

  </div>

  <!-- =================== RIGHT RAIL =================== -->
  <aside class="right-rail" aria-label="Mode">
    <button class="rail-btn" title="Menu" aria-label="Menu">
      <svg class="ico-svg" viewBox="0 0 24 24" fill="currentColor">
        <circle cx="12" cy="5"  r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/>
      </svg>
    </button>
    <button class="rail-btn active" title="Viewing" aria-label="Viewing">
      <svg class="ico-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7S2 12 2 12z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
    </button>
    <button class="rail-btn" title="Modelling" aria-label="Modelling">
      <svg class="ico-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 4l6 6-10 10H4v-6L14 4z"/>
      </svg>
    </button>
    <button class="rail-btn" title="Compliance" aria-label="Compliance">
      <svg class="ico-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="12 2 15 9 22 9.5 17 14.5 18.5 22 12 18 5.5 22 7 14.5 2 9.5 9 9 12 2"/>
      </svg>
    </button>
  </aside>

  <!-- =================== DRAWER (node details) ================== -->
  <aside class="drawer" id="drawer" aria-hidden="true" aria-label="Node details">
    <div class="drawer-head">
      <div class="drawer-chrome">
        <button class="drawer-drill" id="drawerDrill" type="button" hidden>Open sub-process →</button>
        <button class="drawer-close" id="drawerClose" type="button" aria-label="Close details">✕</button>
      </div>
      <div class="drawer-eyebrow" id="drawerEyebrow"></div>
      <h2 class="drawer-title" id="drawerTitle"></h2>
      <div class="drawer-sub" id="drawerSub"></div>
    </div>
    <div class="drawer-body" id="drawerBody"></div>
  </aside>

</div>

<script src="diagrams.js"></script>
<script src="renderer.js"></script>
</body>
</html>
